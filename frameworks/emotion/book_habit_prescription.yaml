id: emotion_book_habit_prescription
name: 经典书籍-行为习惯处方型
lane: emotion
subtype: book_habit_prescription
priority: 86
summary: 用一本经典书籍作为载体，从中提炼2-4个具体的行为习惯，每个习惯用书中的故事细节做论证，并给出可操作的数值公式或行动步骤。跟book_concept_breakdown的区别：那篇拆认知概念（想通什么），这篇拆行为习惯（做什么）。标题用诊断观察句式（发现没/发现一个现象），制造群体认同。适合理财习惯、行为改变、生活方法论类选题。
suitable_topics:
- 理财习惯
- 行为改变
- 生活方法论
- 存钱
- 消费观
- 自律
- 时间管理
- 健康习惯
suitable_goals:
- click
- save
- share
material_types:
- story
- opinion
- method
material_depth:
  min: light
keywords:
- 习惯
- 存钱
- 方法
- 行动
- 步骤
- 改变
- 坚持
- 公式
- 法则
- 实操
anti_keywords:
- 原理
- 底层逻辑
- 认知
- 本质
- 规律
required_materials:
- 一本经典书籍（最好是通俗易懂的大众读物，童书尤佳降低阅读门槛）
- 书中2-4个具体的行为习惯（每个习惯有明确的操作动作，不是抽象概念）
- 每个习惯对应的书中故事或角色经历
- 至少一个数值公式或分配法则（如50/40/10、7天法则等）
hook_pattern: 用书中一句最有代入感的名言开场，再用两三句把名言的语境翻到读者当下。接着用一句诊断观察（发现没/有没有注意到/你有没有发现）指出一个普遍行为模式，最后用排除法（不是A也不是B而是C）给出阅读承诺。开头控制在6段以内。
section_flow:
- 习惯一：解决为什么的问题（目标/动机/方向），用书中角色的顿悟场景做支撑
- 习惯二：解决怎么做的问题（方法/原则/核心操作），用寓言或类比让抽象方法变得可感
- 习惯三：解决反直觉的问题（最容易被做错的习惯），给出具体数值公式或分配法则，用正反对比证明
ending_pattern: 先用一句总结性判断收束全书价值（这本书很薄但说的事很多人没想明白），再用有人有人对比句做群体画像，最后用一个温暖的具体意象做收束（希望我们都能像X一样）。
constraints:
- 每个习惯必须有具体的操作动作，不能只讲道理（写清单、存X%、先Y再Z）
- 至少有一个数值公式或比例法则，让读者觉得可以直接照做
- 书中的故事用角色名和具体场景，不要概括成理论
- 每节的判断句要呼应标题的诊断（存不下钱不是X而是Y）
- 不要在文中解释经济学原理或引用学术研究（用书中的故事代替）
- 数值公式要看起来简单到不用想就能执行（50/40/10比复利公式好）
- 标题的排除法（不是A也不是B而是C）中，A和B必须是读者真正在想的原因
not_for:
- 纯认知洞察类文章（用book_concept_breakdown）
- 需要深度理论解释的学术文
- 无书籍载体支撑的纯方法论
- 书评或读书笔记
title_pattern:
  original_title: 《小狗钱钱》：发现没，存不下钱的人，都有一个通病，不是赚得太少，也不是开销太大，而是缺少这3个习惯
  title_type: 经典IP锚定+诊断观察句+排除法+习惯清单承诺
  hook_point: 发现没制造社交对话感（像朋友间的发现），存不下钱的人精准锁定目标人群，通病制造紧迫感，不是A也不是B排除错误归因，缺少这3个习惯给出明确阅读承诺
  reader_promise: 读完能获得3个可以直接照做的存钱习惯，不再存不下钱
  emotion_trigger: 认同感（对，我就是这样的）+ 排除感（原来不是A/B的问题）+ 获得感（得到了可操作的方法）
  information_gap: 存不下钱的真正原因和具体解决方法之间的落差
  formula: 《{书}》：发现没，{行为描述}的人，都有{问题定性}，不是{错误归因1}，也不是{错误归因2}，而是缺少这{N}个习惯
  reusable_templates:
  - 《{书}》：发现没，{行为描述}的人，都有{问题定性}，不是{错误归因1}，也不是{错误归因2}，而是缺少这{N}个习惯
  - 《{书}》：有没有发现，{人群}都有一个{问题}，原因不是{A}，而是{N}个习惯
  - 《{书}》：{人群}为什么总是{负面结果}？不是{A}也不是{B}，而是缺少{N}个习惯
  variable_slots:
  - slot: 书
    meaning: 经典书籍名称，最好是通俗易懂的大众读物
  - slot: 行为描述
    meaning: 目标读者正在做的行为（存不下钱、瘦不下来、早起失败等）
  - slot: 问题定性
    meaning: 对这个行为的定性判断（通病、共同点、规律等）
  - slot: 错误归因
    meaning: 读者自认为的原因（赚得少、开销大、意志力差等），用于排除
  - slot: N
    meaning: 习惯数量，必须和正文章节数一致
  constraints:
  - 行为描述必须是读者正在经历的真实困境，不能太抽象
  - 错误归因必须是读者自己会说的原因，排除感才有效
  - 书必须跟选题高度相关，不能强行借书名
  - 习惯数量建议3个，2个太少没有清单感，4个以上读者记不住
