id: emotion_historical_figure_timeline
name: 历史人物生命线叙事型
lane: emotion
subtype: historical_figure_timeline
priority: 88
summary: 用一个历史名人的真实人生轨迹做叙事载体，按时间线切分2-4个关键节点，每个节点对应一个认知维度。每节用历史细节+金句论证，最后翻回读者当下。标题用排比递进式长句，情绪冲击力极强。适合逆境觉醒、人生磨砺、心智成长类选题。
suitable_topics:
- 逆境觉醒
- 人生磨砺
- 心智成长
- 生命感悟
- 底层认知
- 坚韧
suitable_goals:
- click
- share
- save
material_types:
- story
- opinion
material_depth:
  min: medium
keywords:
- 磨砺
- 觉醒
- 逆境
- 人生
- 开悟
- 坚持
- 低谷
- 历史
- 名人
- 心
- 悟
anti_keywords:
- 教程
- 步骤
- 操作
- 工具
- 安装
required_materials:
- 一个有广泛认知度的历史人物（自带权威和文化认同）
- 人物一生中2-4个关键转折节点（每个节点有具体事件细节）
- 每个节点对应的一句核心名言或原话
- 每个历史节点到读者当下的翻译桥梁
hook_pattern: 用人物最著名的一句名言开场，紧跟两三个极短段落制造悬念（你以为他在说X，其实他说的是Y），把一句话从具体语境翻到人生维度。开头不超过6段，每段不超过2句。
section_flow:
- 第一个节点：早期的挫折或打击（建立人物不是天生强大的事实感）
- 第二个节点：人生的至暗时刻+顿悟（最核心的情感高点，有具体场景细节）
- 第三个节点（可选）：功成之后的另一重考验（证明觉醒不是终点，而是新的起点）
- 第四个节点（可选）：用一个核心概念做收束（把人物一生的经验浓缩成可行动的认知）
ending_pattern: 用三组有人有人对比句做蒙太奇收束（有人碎裂，有人重生），不安慰不鸡汤，用事实陈述做结尾。最后一句话最好是文中核心概念的回扣。
constraints:
- 历史细节必须有，但不能写成人物传记或历史课，每节只取一个场景
- 每节必须有从历史到当下的翻译桥梁（这句话放在今天就是……）
- 名言用引用格式标注出处，每节最多1-2句
- 标题的排比递进必须有阶梯感（磨到你A→磨到你B→磨到你C），不能在同一层面重复
- 不要给人物做现代心理分析，只描述行为和结果
- 结尾的有人有人对比句必须是全文明暗线的浓缩，不能泛泛而谈
- 人物必须是真的有广度的人生（经得起多个节点拆解），不要选经历太单薄的人物
not_for:
- 纯历史人物介绍或传记
- 无真实历史细节支撑的鸡汤文
- 需要操作步骤的实用文
- 名人名言合集（那是另一种结构）
title_pattern:
  original_title: 王阳明：天若助你，必先磨你，磨到你生死看淡，磨到你无情无义，磨到你身无分文，磨到你身心崩溃，磨到你开悟脱胎换骨涅槃重生
  title_type: 历史人物锚定+排比递进长句
  hook_point: 天若助你必先磨你制造反转预期（助你=磨你？），排比递进的磨到你X层层升级情绪冲击，最后的开悟脱胎换骨涅槃重生给出终极承诺
  reader_promise: 读完能理解苦难的真正意义，从被迫承受变成主动迎接
  emotion_trigger: 震撼+共鸣+被理解+希望（被磨不是惩罚，是必经之路）
  information_gap: 苦难和开悟之间的因果关系——大多数人只看到磨的痛苦，没看到磨之后的脱胎换骨
  formula: '{历史人物}：{核心判断}，{排比递进1}，{排比递进2}，{排比递进3}，{终极结果}'
  reusable_templates:
  - '{历史人物}：{核心判断}，{递进1}，{递进2}，{递进3}，{终极结果}'
  - '{历史人物}：{核心判断}，{递进1}，{递进2}，{终极结果}'
  - '{历史人物}：{核心判断}，{递进1}，{递进2}'
  variable_slots:
  - slot: 历史人物
    meaning: 有广泛认知度的历史名人，自带文化权威
  - slot: 核心判断
    meaning: 全文的底层论断（如天若助你必先磨你、真正的强大从X开始）
  - slot: 排比递进
    meaning: 2-4个层层升级的磨砺描述，从外在到内在，从身体到精神
  - slot: 终极结果
    meaning: 磨砺完成后的蜕变状态（开悟、重生、觉醒等）
  constraints:
  - 排比递进必须有明显的阶梯感，不能在同一层面重复
  - 终极结果必须跟核心判断形成呼应（磨你→助你）
  - 标题长度可以很长但不能信息稀释，每个排比项都必须有信息增量
  - 历史人物必须是大众认知度高的，冷门人物没有锚定效果
