id: emotion_book_narrative_awakening
name: 经典文学作品-叙事觉醒型
lane: emotion
subtype: book_narrative_awakening
priority: 85
summary: 围绕一部经典文学作品中的核心人物，用极短段落和极简叙事重现人物的困境、挣扎和觉醒过程。全程不说教不方法论，只用细节让读者自行代入。适合女性成长、亲密关系、家庭关系等赛道。
suitable_topics:
- 亲密关系觉醒
- 女性自我认知
- 原生家庭/婚姻困境
- 情绪疗愈
suitable_goals:
- read_finish
- share
- save
material_types:
- story
- opinion
material_depth:
  min: heavy
keywords:
- 觉醒
- 忽略
- 自我
- 婚姻
- 关系
- 看见
- 习惯
- 独立
anti_keywords:
- 方法论
- 教程
- 工具
- 步骤
required_materials:
- 一部有明确人物成长弧线的经典文学作品（小说/散文/自传）
- 人物困境的具体生活细节（不是概念描述，是动作和场景）
- 一个极小的转折点（不是戏剧性事件，是日常瞬间）
- 一个非爽文式的结局（人物只是开始改变，没有彻底翻盘）
hook_pattern: 先给一句金句定调（用书中人物的经历浓缩成一个判断），再用两三句话定义全文定位（'这不是一个XX故事，是一个XX用XX年换来的XX'），让读者在读正文之前就知道这篇文章要给什么情绪。开头不制造悬念，直接给情绪承诺。
section_flow:
- 困局建立（时间线推进）：用年份或阶段递进（第一年→第二年→第五年→第十年），展示人物如何在日常中一步步失去自我，制造窒息感。关键技巧：时间线越具体，读者的代入感越强
- 转折点（极小细节触发）：用一个极其日常的对话或动作触发崩溃（'菜凉了''那你先吃'），不是大吵、不是出轨、不是戏剧性事件。转折越小，越真实，越能让读者产生'我也有过这种时刻'的共鸣
- 视角切换（理解对方但不洗白）：切换到另一方视角，展示'他不是不爱你，他是没有爱的能力'——看似在理解对方，实际是让读者更绝望。用一个区分性判断制造认知冲击（'不想做vs忘了做''需要是功能性的，爱是看见'）
- 归因翻转（问题不在外部在自己）：展示人物的多次尝试全部失败（试过A→试过B→试过C），引出核心洞见——'你一直在跟自己的不够好较劲'。用心理机制解释为什么人会这样做（因为'我还不够好'至少有一个方向可以努力）
- 觉醒开始（动作极小、不是翻盘）：人物的改变不是戏剧性的（没有离婚、没有事业有成），而是极其朴素的日常动作（重新上班、跟朋友出去、一个人看两小时书）。关键：强调'不是那种终于离开他的活，是那种原来还可以这样活的活'
- 蒙太奇收尾（有人...有人...有人...）：用四组'有人'排比句让不同阶段的读者对号入座，不号召行动，不总结方法论，只描述读者读完之后的可能状态
ending_pattern: 用四组'有人'排比句做蒙太奇收尾（有人看见了自己的母亲/有人看见了自己正在走的路/有人想起了某件一直没做的事/有人已经走到那个地方还在往前），让不同阶段的读者自行对号入座。不号召行动、不催互动、不给方法论，留白。
constraints:
- 全文92%以上短句（每段不超过30字），制造一口气读完的节奏
- 不说教、不爹味、不给方法论、不号召行动
- 转折点必须是日常小事，不能用戏剧性事件（出轨、家暴、大吵）
- 人物解法必须朴素，不能写成爽文（没有事业有成、没有光彩照人）
- '''不是X，是Y''翻转句式全文至少出现10次以上，形成节奏感'
- 时间线叙事必须有具体年份或阶段，不能泛泛说'过了很久'
- 视角切换的目的是服务主立场，不是真的在平衡——看似理解对方，实际让读者更绝望
- 标题必须直接给出核心判断，不制造悬念——用信息密度筛选读者
not_for:
- 需要给方法论/操作步骤的内容
- 需要号召行动/转化的内容
- 男性视角的情感内容
- 纯知识科普类内容
title_pattern:
  original_title: 余华《女人的胜利》:不要纠结男人爱不爱你，男人是没有爱情的，他跟小孩一样，只想要快乐和无条件的母爱，真正的觉醒，是找回自己
  title_type: 身份代入
  hook_point: 直接给出反常识判断（'男人是没有爱情的'），精准筛选读者——只有经历过忽视的女性会被这句话击中
  reader_promise: 读完你能理解'为什么你一直在缩小自己'，并获得一种'原来不是我的问题'的情绪释放
  emotion_trigger: 委屈→共鸣→警醒→释然
  information_gap: 标题已给出结论，信息差不在'是什么'，在'为什么'和'细节是什么样的'
  formula: 《{IP/作品}》:{核心反常识判断}，{补充解释1}，{补充解释2}，{最终觉醒方向}
  reusable_templates:
  - 《{作品名}》：{反常识判断}，{视角解释}，{认知翻转}，{觉醒方向}
  - 《{IP名}》告诉你：你以为的{常见误解}，其实是{本质判断}，{补充论证}，{觉醒方向}
  variable_slots:
  - slot: '{IP/作品}'
    meaning: 经典文学/影视/文化IP名称，用于建立权威感和话题性
  - slot: '{核心反常识判断}'
    meaning: 挑战读者已有认知的一句话判断，制造筛选效应
  - slot: '{补充解释}'
    meaning: 用1-2个分句展开反常识判断的原因或表现
  - slot: '{觉醒方向}'
    meaning: 全文最终要引导读者到达的认知状态
  constraints:
  - 不要照搬原标题的具体人物名、具体情节描述
  - 标题信息密度要高，可以长但每句都必须有判断力
  - 不要制造悬念型标题，直接给结论筛选读者
