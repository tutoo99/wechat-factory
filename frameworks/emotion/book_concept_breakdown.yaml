id: emotion_book_concept_breakdown
name: 经典畅销书-核心概念拆解型
lane: emotion
subtype: book_concept_breakdown
priority: 85
summary: 用一本经典畅销书作为认知载体，从中提炼2-3个核心概念，每个概念用书中的故事细节做论证，最后回到读者自身，给出行动反思。适合金钱认知、思维升级、认知类选题。标题长句式，直接对标焦虑人群。
suitable_topics:
- 金钱认知
- 财务思维
- 认知升级
- 思维方式
- 自我成长
- 人生规划
suitable_goals:
- click
- save
- share
material_types:
- story
- opinion
material_depth:
  min: light
keywords:
- 认知
- 思维
- 金钱
- 财商
- 资产
- 负债
- 底层逻辑
- 改变
- 学习
- 成长
anti_keywords:
- 教程
- 操作步骤
- 安装
- 配置
required_materials:
- 一本被广泛认知的畅销书（作为论证载体和可信度锚点）
- 书中2-3个核心概念（每个概念需要书中故事或细节支撑）
- 每个概念对应的读者现实映射（从书中回到读者自身）
- 一个贯穿全书的对比结构（穷爸爸vs富爸爸等二元对立）
hook_pattern: 以书名+一句最具代表性的金句开场，制造道理谁都懂但做不到的共鸣张力，再简述作者背景和销量数据建立权威感，最后用一句反常识论断把读者的焦虑和书的核心观点连起来，制造我要看下去的阅读动力。
section_flow:
- 概念一：打破一个普遍的惯性认知（如努力工作就能解决财务问题），用书中的具体故事细节论证
- 概念二：引入全书最重要的分界线概念（如资产vs负债），用最容易引起争议的例子让读者思考
- 概念三：指出问题的根源在于认知缺失，给出可行动的方向（如财商需要自学），用书中人物的选择做正反对比
ending_pattern: 用三组对比句浓缩全文观点差异，再用一句话点明全书的本质，最后用书中核心人物的对比关系做温暖收束，不催互动。
constraints:
- 书只是载体，不能写成书评或读书笔记
- 每节必须有书中的故事或细节做支撑，不能只讲道理
- 每节末尾必须回到读者自身，用问句或判断句把书中概念映射到读者现实
- 金句密度控制在每节1-2句，用引用格式标注出处
- 不要在同一节里解释太多概念，一节一个核心概念
- 标题的长句结构要有明确的反面否定加正面指引（不是A，而是B）
- 文末收束部分不能复述正文，要用更高的视角重新审视全书
not_for:
- 纯书评或读书笔记
- 无书籍载体支撑的纯观点文
- 需要具体操作手册的实用文
title_pattern:
  original_title: 《富爸爸穷爸爸》：如果35岁还负债，首先要做的不是找份工作上班、拼命赚钱，而是做到以下3点
  title_type: 经典IP锚定+长句反常识+数字清单承诺
  hook_point: 35岁还负债直击中年财务焦虑，首先要做的不是A打破惯性思维，而是做到以下3点给出明确阅读承诺
  reader_promise: 读完能获得3个改变财务认知的核心概念，不再用错误的方式拼命
  emotion_trigger: 焦虑+警醒+获得感
  information_gap: 你以为的努力赚钱和真正能改变财务状况的做法之间的巨大落差
  formula: 《{畅销书}》：如果{焦虑场景}，首先要做的不是{惯性做法}，而是做到以下{N}点
  reusable_templates:
  - 《{畅销书}》：如果{焦虑场景}，首先要做的不是{惯性做法}，而是做到以下{N}点
  - 《{畅销书}》：{人群}一直{错误做法}，直到明白了书中的{核心概念}
  - 《{畅销书}》：为什么{普遍现象}？书里早就给出了答案，可惜大多数人只看到了表面
  variable_slots:
  - slot: 畅销书
    meaning: 被广泛认知的畅销书名称，自带权威感
  - slot: 焦虑场景
    meaning: 目标读者正在经历的痛苦状态（负债、焦虑、迷茫等）
  - slot: 惯性做法
    meaning: 大多数人遇到这个问题时会做的第一反应（找工作、拼命赚钱等）
  - slot: N
    meaning: 文章要拆解的核心概念数量（2-4个）
  constraints:
  - 焦虑场景必须跟目标读者高度共鸣，不能用太抽象的表达
  - 不是A而是B中的A必须是读者确实在做的事情，否则没有冲击力
  - N的数量必须和正文章节数一致，不能标题说3点正文只写2节
  - 畅销书必须是大众熟知的，冷门书没有锚定效果
