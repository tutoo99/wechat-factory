id: emotion_health_persuasion
name: 养生劝导型
lane: emotion
subtype: health_persuasion
priority: 85
summary: 适合"科学数据开门 → 反面案例警示 → 自身/名人转变验证 → 正面榜样 + 实用建议收尾"的养生健康劝导文。核心逻辑：用权威数据建立信任，用惨痛案例制造恐惧，用转变故事给予希望，用榜样+tips降低行动门槛。
suitable_topics:
  - 饮食习惯
  - 体重管理
  - 中年养生
  - 慢病预防
  - 生活方式转变
suitable_goals:
  - save
  - share
  - read_finish
material_types:
  - case
  - opinion
  - list
material_depth:
  min: medium
keywords:
  - 少吃
  - 养生
  - 中年
  - 健康
  - 节制
  - 自律
  - 七八分饱
anti_keywords:
  - 带货
  - 保健品推荐
required_materials:
  - 一个权威科学研究或数据（期刊、临床试验等）
  - 至少一个反面真实案例（因不节制导致重病）
  - 一个自身或名人转变故事（从不健康到健康）
  - 一到两个正面长寿榜样
  - 3-5条实用可执行建议
hook_pattern: 先抛权威科学数据（期刊/临床试验），用具体数字（百分比、年限）制造冲击，再接"我们常说XX，却忘了XX"的认知反转。
section_flow:
  - 引子：权威科学数据 + 认知反转金句
  - 第一部分「为什么要改」：肥胖/不节制的危害升级 → 真实反面案例（从普通习惯到重病，有过程有细节）→ 古语点题（如《黄帝内经》）
  - 第二部分「转变的过程」：名人或自身经历（不健康 → 警示信号 → 改变 → 好转）→ 个人感悟升华
  - 第三部分「怎么做」：正面长寿榜样（共同点：节制）→ 实用建议清单（具体、可操作、有数字）→ 古语收束
ending_pattern: 用一句经典古语/民间智慧做总结金句（如"减食添寿"），再接一句面向未来的展望（"你的身体，会在十年后感谢你今天的决定"），最后"点个推荐，与所有XX共勉"。
constraints:
  - 案例必须有具体人名和细节，不能泛泛而谈
  - 科学数据必须标注来源（期刊名、研究机构）
  - 实用建议要有具体数字（如"七分量""300ml""2公斤"）
  - 不要写成科普论文，要有人情味和叙事节奏
  - 古语引用不超过3处，点到为止
not_for:
  - 纯医学科普文
  - 带货软文
  - 无真实案例支撑的空洞说教
  - 强冲突反转的故事情节
