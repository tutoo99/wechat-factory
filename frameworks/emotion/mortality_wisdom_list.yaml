id: emotion_mortality_wisdom_list
name: 临终感悟清单型
lane: emotion
subtype: mortality_wisdom_list
priority: 87
summary: 适合"死亡事件聚合引出 → N个人生道理清单 → 每节一个临终/重症案例 + 反思 + 行动建议"的生死感悟文。核心逻辑：用死亡的重量制造情感冲击和阅读紧迫感，用临终遗言的"真话感"绕过读者心理防线，清单体将沉重话题拆成可消化的行动启示。
suitable_topics:
  - 人生感悟
  - 生死思考
  - 生活方式反思
  - 癌症/重症患者故事
  - 遗憾与珍惜
suitable_goals:
  - read_finish
  - share
  - save
material_types:
  - case
  - opinion
  - list
material_depth:
  min: heavy
keywords:
  - 遗言
  - 遗憾
  - 临终
  - 下半生
  - 后半生
  - 活在当下
  - 珍惜
  - 癌症
anti_keywords:
  - 带货
  - 保健品
  - 养生秘诀
required_materials:
  - 一个近期去世的普通人/博主的死亡事件 + 遗言/告别信（作为引子）
  - 3-6个已故或重症人物的真实故事（每节一个，需有姓名、职业、病名、具体细节）
  - 每个人物的一句临终感悟或遗憾（原文引用）
  - 每节一个明确的人生道理（行动导向）
  - 结尾一句关于生死的名家金句
hook_pattern: 从一个具体的人的死亡事件切入（抗癌博主、名人、普通人），引用其遗言/告别信中的原话，制造情感冲击。再接一个"聚合桥段"——连续罗列2-5个相似的死亡案例和遗言，形成"死亡蒙太奇"效应，最后引出"如果你也觉得XX，不妨看看他们悟出的道理"。
section_flow:
  - 引子：一个死亡事件 + 遗言原文 → 聚合桥段（多个死亡案例快速罗列）→ 情感触发句（"我深受触动"）→ 过渡到"以下N个道理"
  - 第1~N节（每节结构）：
    1. 道理标题（祈使句：不要XX / 要XX / 别XX / 趁早XX）
    2. 一个将死/已故之人的真实故事（姓名、职业、病名、具体经历、时间线）
    3. 此人的一句临终感悟或遗憾（直接引用，保持"真话感"）
    4. 作者的反思/议论（将个人故事升华为普遍道理）
    5. 对读者的行动建议（"下半生，XX"句式）
    6. 一句哲理收束（短句、对仗）
  - 收尾：名家关于生死的金句 → "除了生死，其他都是擦伤" → 祝福语
ending_pattern: 引用一位作家/哲人关于生死的名言（如史铁生"死是一件不必急于求成的事"），接一句总结金句（"除了健康地活着，其他都是浮云"），最后用"人生下半场，愿你我XX"做温暖收束。
constraints:
  - 每个案例必须有真实姓名和具体细节（病名、年龄、时间），不能虚构
  - 临终遗言必须是直接引用，保持朴素真实的"真话感"，不要润色成文艺腔
  - 每节道理不能重复，要有递进或不同的切入角度
  - 语气要克制，不要煽情过头——死亡本身就是最大的情感冲击，不需要额外渲染
  - 不要写成"恐吓文"，重点是活着的人怎么活，不是怎么死
  - 名家金句只在开头聚合段和结尾出现，中间各节用当事人自己的话
not_for:
  - 纯健康科普文
  - 名人传记/讣告
  - 无真实案例的空洞鸡汤
  - 轻松娱乐类内容
