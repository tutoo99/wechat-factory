id: emotion_social_insight_counter_intuitive
name: 反常识信息差型
lane: emotion
subtype: counter_intuitive_insight
priority: 88
summary: 用一个冷知识/信息差打穿读者认知，逻辑推演推导出反常识结论。字数极短（300-500字），完读率几乎100%，转发动力是"你知道吗"。核心武器不是故事不是排比，是读者不知道的信息。
suitable_topics:
  - 社会现象背后的真相
  - 历史冷知识
  - 被遮蔽的事实
  - 打破常识的认知
  - 财富/阶层/公平相关
suitable_goals:
  - share
  - click
material_types:
  - data
  - insight
material_depth:
  min: light
keywords:
  - 不要相信
  - 真相
  - 原来
  - 其实
  - 背后
  - 陷阱
  - 没人告诉你
  - 恐怖
  - 细思极恐
anti_keywords:
  - 故事
  - 亲子
  - 育儿
  - 教程
required_materials:
  - 一个有冲击力的冷知识/信息差（核心弹药，整篇文章靠这个撑）
  - 一组能制造冲击力的对比数据（如"月薪12块 vs 一笔生意赚1000万"）
  - 一个反常识结论（颠覆读者已有认知）
hook_pattern: 用反常识的断言开场（"千万不要相信XX"），直接挑战读者已有认知，制造"为什么？我要看"的强烈好奇心缺口。第一句话就要让读者觉得"这跟我想的不一样"。
section_flow:
  - 反常识断言开场：一句话挑战常识
  - 冷知识抛出：用具体事实/历史事件/法规政策等作为论据
  - 算账/对比制造冲击：用数据对比制造"原来如此"的震撼感
  - 逻辑推演：从事实推导出反常识结论，逻辑链条要短（2-3步）
  - 收尾：一句话结论，不解释不延伸，留白让读者自己回味
ending_pattern: 一句话收尾，不要总结不要排比不要升华不要催互动。让读者自己回味，他自己会转发。
constraints:
  - 字数严格控制在300-500字，超过500字就废了
  - 一句话一行，但不是满满前行那种空洞排比，每句话都有信息量
  - 不要讲故事、不要排比、不要伪数据、不要催评、不要tag堆砌
  - 核心是"信息差"不是"观点输出"——读者转发是因为"这个信息我不知道"，不是因为"这个观点我认同"
  - 逻辑链条不能超过3步，读者是刷手机不是做数学题
  - 不要在结尾加"你怎么看""留言讨论"之类的互动引导——这篇文章的力量在于沉默感
  - 落款可以极简（地点+日期），强化"这个人只是说了个事实"的冷感
not_for:
  - 需要深度论证的复杂议题
  - 温鸡汤/正能量内容
  - 需要故事驱动的内容
  - 育儿/情感类情绪文
