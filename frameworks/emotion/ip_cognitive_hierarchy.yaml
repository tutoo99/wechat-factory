id: emotion_ip_cognitive_hierarchy
name: 经典IP锚定-三层认知递进型
lane: emotion
subtype: ip_cognitive_hierarchy
priority: 90
summary: 用一部经典影视/文学作品作为论证载体，通过一个核心角色的行为逻辑，把一个社会常识从"现象-本质-底层认知"三层递进拆解，最终升华到读者自我审视。适合关系认知、阶层洞察、人性规律类选题。
suitable_topics:
- 人脉关系
- 社交认知
- 阶层洞察
- 人性规律
- 价值观冲突
suitable_goals:
- click
- share
- save
material_types:
- story
- opinion
- case
material_depth:
  min: light
keywords:
- 人脉
- 关系
- 认知
- 阶层
- 底层逻辑
- 弱势文化
- 强势文化
- 攀附
- 吸引
anti_keywords:
- 教程
- 工具
- 步骤
- 操作
required_materials:
- 一个被广泛认知的经典影视/文学作品（作为论证载体）
- 一个核心角色的关键行为或选择（作为论据锚点）
- 至少两个对比场景（弱势做法 vs 强势做法）
- 一个底层认知判断（从现象升到本质）
hook_pattern: 用两句有冲突的名言/金句开场，制造认知张力，再引出经典IP作品和一个反常角色定位（"这样一个XX的人，才是最懂XX的那一个"），让读者觉得这篇文章不是在说教，而是借一个有意思的人物来讲道理。
section_flow:
- 现象层：大多数人以为的做法其实是错的（用生活场景+对比关系拆穿常识）
- 逻辑层：真正起作用的规律是什么（用角色行为反推正确逻辑）
- 本质层：底层认知差异决定了行为差异（弱势文化vs强势文化/交出命运vs接回命运）
ending_pattern: 用角色命运的高光时刻做情感锚点（如承受失去），再用对仗句把全文观点浓缩（"前者叫XX，后者叫XX"），最后用一句祝福收束，不催互动。
constraints:
- IP角色只是论证载体，不能写成剧评或剧情复述
- 每一节必须有自己的判断句，不能只靠角色台词支撑
- 三层递进要有明显阶梯感：现象→规律→本质，不能在同一层面打转
- 不要在同一节里堆超过3句角色台词，台词是调料不是主菜
- 结尾的对仗收束句必须是全文观点的浓缩，不能是泛泛的金句
- 不要给角色做心理分析，只描述行为和结果，让读者自己推导
not_for:
- 纯剧情分析或影评
- 无IP载体支撑的纯观点文
- 需要具体操作步骤的实用文
title_pattern:
  original_title: 《天道》：什么是人脉
  title_type: 经典IP锚定+核心概念提问
  hook_point: 用大众熟知的经典作品IP建立可信度和好奇心，"什么是人脉"这个提问直击社交焦虑
  reader_promise: 读完能重新理解人脉的底层逻辑，不再把精力浪费在无效社交上
  emotion_trigger: 警醒（原来之前的做法全错了）+ 获得感（得到了更高维的认知框架）
  information_gap: 你以为的人脉和人脉真正的运作逻辑之间的巨大落差
  formula: 《{IP}》：{核心概念}的{角度}
  reusable_templates:
  - 《{经典作品}》：{社会概念}的{维度}
  - 《{经典作品}》：为什么{普遍现象}总是{失败结果}
  - 《{经典作品}》：{核心概念}的本质，从来不是你以为的那样
  variable_slots:
  - slot: IP
    meaning: 被广泛认知的影视/文学/历史作品名称
  - slot: 核心概念
    meaning: 文章要拆解的社会概念（人脉、情商、格局、自由等）
  - slot: 角度/维度
    meaning: 拆解的切入角度（本质、底层逻辑、真相、残酷现实等）
  constraints:
  - 不要照搬原标题的"《天道》"和"人脉"组合
  - IP必须是读者大概率听说过的大众经典，不要用冷门作品
  - 核心概念必须跟目标读者的生活有直接关联
