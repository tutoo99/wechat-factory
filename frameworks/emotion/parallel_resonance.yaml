id: emotion_female_growth_parallel_resonance
name: 平行情绪共鸣型
lane: emotion
subtype: parallel_resonance
priority: 90
summary: 适合"N个并列的情绪痛点，每个用相同微型结构展开"的女性成长文。靠重复击打同一类情绪制造共鸣，不需要递进关系，完读率高，容易进流量池。核心武器是真实故事，不是伪数据。
suitable_topics:
  - 女性成长
  - 自我接纳
  - 打破束缚
  - 情绪困境
  - 认知觉醒
suitable_goals:
  - read_finish
  - share
  - click
material_types:
  - story
  - list
  - opinion
material_depth:
  min: medium
keywords:
  - 羞耻
  - 接纳
  - 勇敢
  - 成长
  - 绑架
  - 不完美
  - 为自己活
  - 放下
  - 突破
  - 女生
  - 女性
anti_keywords:
  - 课程
  - 购买
  - 方法论
  - 教程
required_materials:
  - 一个核心情绪痛点词（如"羞耻""自卑""委屈"）
  - N个（通常3-5个）并列的子痛点
  - 每个子痛点至少一个真实故事（有人物、有场景、有细节、有转折、有结果）
  - 每个子痛点一个认知反转（从困住到解脱）
  - 每个子痛点一个升华句（一句话总结这一步的成长）
hook_pattern: 用"我们"开头，描述一个普遍的情绪体验，建立"我们都有过"的群体认同（不是用"你"说教）。接着一句话点明全文主题（"女性的成长，就是一次次挣脱内心的枷锁"），让读者知道这篇文章要讲什么、读完会得到什么。
section_flow:
  - 群体认同开场：用"我们"开头，描述一个普遍的情绪体验，不需要读者思考，直接击中
  - 核心论点前置：一句话点明全文主题，告诉读者"跨过这几道坎，才能真正活得自在"
  - 并列展开（核心主体）：N个子痛点，每个用相同的微型结构循环：
    - 子场景标题：第N次XX（明确告诉读者这是第几点）
    - 场景描述：具体的生活表现，用"我们"或"很多女性"开头，让读者代入
    - 真实故事：一个有具体人物、场景细节、情绪转折、行为变化的故事（如"邻居家的女孩含胸驼背→后来挺直腰板穿喜欢的衣服，整个人都变亮眼"）
    - 认知反转：从困住到解脱的思维转换
    - 升华句：一句话总结这一步的成长
  - 排比回顾结尾：用排比句把N个子痛点的成长浓缩，形成收束感
  - IP收尾+引流：用个人IP语气收尾，推荐相关阅读，引导关注
ending_pattern: 用排比句回顾全文要点（"跨过XX的羞耻，学会XX；跨过XX的羞耻，学会XX"），然后切回个人IP语气收尾，推荐一篇相关旧文，引导关注。不要催评。
constraints:
  - 每个子痛点必须有一个真实故事，故事要有具体人物（可以是"朋友""闺蜜""邻居"）、具体场景、情绪转折、行为变化
  - 禁止编造数据来增加权威感。如果要引用数据，必须是可查证的来源
  - 每个子痛点的微型结构必须一致，制造节奏感和可预期性
  - 不要说教、不要爹味，用"我们"拉近距离，而不是"你应该"
  - 排版用正常段落，不要太短也不要太长，手机上2-3行一段最舒适
  - 不要在情绪文中夹带产品/课程/转化
  - 不要堆砌hashtag
  - 不要催评（"认同的留个足迹""留下一句祝福"等）
not_for:
  - 有转化目的的文章（卖课/推产品）
  - 需要深度逻辑论证的内容
  - 男性受众为主的选题
  - 需要具体方法论指导的内容
  - 批量生产/洗稿（这种打法短期可进池但不可持续）
