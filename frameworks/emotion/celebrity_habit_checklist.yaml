id: emotion_celebrity_habit_checklist
name: 名人锚定清单型
lane: emotion
subtype: celebrity_habit_checklist
priority: 88
summary: 适合"名人事件引出 → N个坏习惯/好习惯清单 → 每节同构叙事（案例+数据+古语+建议）→ 名人金句收束"的健康/自律劝导文。核心逻辑：名人作为贯穿全文的信用锚点，每节复用同一叙事模板降低阅读成本，清单体制造"条条命中"的完读驱动力。
suitable_topics:
  - 健康习惯
  - 坏习惯戒除
  - 养生自律
  - 名人健康故事
  - 生活方式重建
suitable_goals:
  - read_finish
  - save
  - share
material_types:
  - list
  - case
  - opinion
material_depth:
  min: medium
keywords:
  - 坏习惯
  - 好习惯
  - 自律
  - 健康
  - 养生
  - 名人
  - 抗癌
  - 止损
anti_keywords:
  - 带货
  - 保健品
required_materials:
  - 一个名人健康事件（抗癌、重病、康复等）作为全文锚点
  - 3-6个具体坏习惯/好习惯（每个习惯一个独立小节）
  - 每个小节：至少一个真实案例 + 一个权威来源（数据或专家）+ 一句古语/民间智慧
  - 名人在每个小节中的具体行为或引用（保持锚点不断）
  - 结尾名人原话 + 行动号召
hook_pattern: 从一个名人近期公开事件（发布会、访谈、社交媒体）切入，简述其健康经历（疾病→抗争→现状），抛出核心洞察"这不是运气，而是XX"，引出"以下N个习惯，我决定从今天改掉"。
section_flow:
  - 引子：名人事件 → 健康经历概述 → 核心洞察金句 → "以下N个习惯我要改"
  - 第1~N节（每节同构）：
    1. 习惯标题（否定式："从不给XX"或"总是XX"）
    2. 一个非名人的反面案例（具体人名、职业、病程细节）
    3. 名人在这个习惯上的做法或引用（保持锚点）
    4. 权威数据或专家观点（期刊、医院、研究机构）
    5. 一句古语或养生谚语点题
    6. 一段行动建议（可操作、有温度）
  - 收尾：名人原话总结 → "好习惯成就健康，坏习惯消耗生命" → 行动号召
ending_pattern: 用名人的一句原话做金句收束，再接一句哲理总结（"最顶级的自律，不是XX，而是XX"），最后"点亮推荐，与朋友共勉"。
constraints:
  - 名人必须贯穿全文，每节至少出现一次（做法、引用或案例），不能只在开头和结尾出现
  - 每个小节结构必须同构，读者扫读时能预期"下一段讲什么"
  - 案例要有具体人名和职业，不能泛泛而谈
  - 古语/谚语每节最多1句，全文不超过N+1句
  - 不要写成名人传记，名人是锚点不是主角，重点是习惯本身
  - 行动建议要有情感温度，不要像医嘱
not_for:
  - 纯名人八卦/传记文
  - 无名人素材的普通养生文
  - 强冲突反转的故事情节
  - 需要深度论证的科普论文
source_article:
  url: https://mp.weixin.qq.com/s/L3Ylh7en48hXacs0PUZC7A
  title: 朱迅抗癌20年，从今天起，这5个要命习惯我逼自己改掉
  author: 每晚·ciyu
