id: tech_product_conversion_course
name: 干货前置 + 课程转化型
lane: tech
subtype: product_conversion_course
priority: 85
summary: 适合"先给大量免费干货建立信任，预处理异议，再引出付费课程"的产品转化文。读者在付费前已经觉得拿到了价值，转化阻力低。
suitable_topics:
  - 实操方法论分享
  - 踩坑经验总结
  - 工具/技术选型
  - 行业实战案例
suitable_goals:
  - click
  - conversion
material_types:
  - case
  - list
  - problem
material_depth:
  min: medium
keywords:
  - 踩坑
  - SOP
  - 实操
  - 课程
  - 训练营
  - 线下
  - 内测
  - 首期
anti_keywords:
  - 纯广告
required_materials:
  - 至少 3 条真实踩坑经验或干货结论
  - 一个明确的付费产品（课程/训练营）
  - 具体的前后对比数据或案例
hook_pattern: 开头直接亮结果（数字+成果），建立可信度，再用"先分享几个更值钱的东西"做悬念桥梁，让读者愿意往下看干货。
section_flow:
  - 开头：自我介绍 + 结果前置（数字背书） + "先送干货再卖课"的桥梁
  - 干货主体：3-5 个踩坑经验，每条统一微型结构（做了什么 → 结果失败 → 认知反转 → 一句话结论）
  - 干货收束：回顾总结 + "不想等 → 往下看"的转折
  - 异议预处理：主动提出读者可能的质疑（割韭菜？为什么公开？），给出真实可信的原因
  - 产品价值对比：旧做法的成本/痛点 vs 新做法的优势（3 个对比点，每个带数字）
  - 课程/产品详情：具体课表或产品说明，每个模块回扣前面的干货
  - 行动号召：价格 + 稀缺性（限名额/限时） + 紧迫感
ending_pattern: 预告后续系列内容 → 引导关注公众号，让没付钱的人也有理由留下。
constraints:
  - 干货部分至少占全文 50%，不能上来就卖课
  - 踩坑经验要有真实细节（具体数字、具体时间、具体动作），不能泛泛而谈
  - 异议处理要真诚，不能回避明显质疑
  - 课程介绍要回扣干货，让读者觉得"付费是自然延伸"而非突然切换
  - 结尾的系列预告要具体（说清楚下一篇写什么），不能只说"持续关注"
not_for:
  - 纯软文/硬广（没有干货支撑）
  - 免费工具推荐型（底部带购买链接但主体是工具测评）
  - 服务咨询转化型（卖的是咨询/服务而非课程）
