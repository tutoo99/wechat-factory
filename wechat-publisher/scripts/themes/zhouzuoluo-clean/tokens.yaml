colors:
  primary: "#333333"
  secondary: "#222222"
  accent: "#FA5359"
  text: "#333333"
  text_secondary: "#606060"
  text_muted: "#888888"
  surface: "#FFFFFF"
  surface_soft: "#FFFFFF"
  border: "#CCCCCC"
  link: "#0052FF"
  code_bg: "#F3F3F3"
  code_inline_bg: "#F3F3F3"
  quote_bg: "#FFFFFF"
  highlight_bg: "#FFFFFF"
  heading_palette:
    - "#222222"
    - "#333333"
    - "#FA5359"
  code_text: "#333333"
  code_label: "#888888"
  inline_code_text: "#333333"
  red_accent: "#FA5359"
  red_accent_alt: "#FF4C41"
  blue_link: "#0052FF"

typography:
  font_family: "'PingFang SC','Microsoft YaHei','Noto Sans SC',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif"
  body_size: 17
  lead_size: 17
  caption_size: 14
  code_size: 14
  line_height: 1.9
  letter_spacing: 0.544
  letter_spacing_accent: 0.5
  h2_size: 24
  h3_size: 20
  h4_size: 18
  footnote_size: 13
  font_weight_heading: bold
  font_weight_body: 400
  text_align: justify

spacing:
  content_padding_x: 8
  paragraph_gap: 18
  block_gap: 14
  section_gap_top: 30
  section_gap_bottom: 16
  sub_section_gap_top: 22
  sub_section_gap_bottom: 12
  image_gap: 16

radius:
  sm: 0
  md: 0
  lg: 0

border:
  width_thin: 0
  width_strong: 0

shadow:
  card: "none"
  image: "none"
