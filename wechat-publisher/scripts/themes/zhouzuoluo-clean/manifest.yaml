authoring_notes:
  - 纯文字利器，不依赖任何背景色/卡片/边框来制造视觉层次
  - 排版节奏完全靠字号层级（17/18/20/24px）和红色强调句驱动
  - 适合金句密集、观点密集的干货长文，让文字本身说话
  - 红色（#FA5359）用于关键句/CTA/数字强调，使用要克制
  - 蓝色（#0052FF）仅用于链接/可点击元素
  - 无代码块样式（原文未使用），需从 tech-clean 继承或自定义
