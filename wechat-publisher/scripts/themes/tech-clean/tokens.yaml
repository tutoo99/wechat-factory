colors:
  primary: "#667eea"
  secondary: "#764ba2"
  accent: "#f093fb"
  text: "#2d3748"
  text_secondary: "#718096"
  text_muted: "#94a3b8"
  surface: "#ffffff"
  surface_soft: "#f7fafc"
  border: "#e2e8f0"
  link: "#667eea"
  code_bg: "#1a1a2e"
  code_inline_bg: "#f0f4f8"
  quote_bg: "#f7fafc"
  highlight_bg: "#fef3c7"
  heading_palette:
    - "#667eea"
    - "#764ba2"
    - "#f093fb"
  code_text: "#e2e8f0"
  code_label: "#a0aec0"
  inline_code_text: "#c0392b"

typography:
  font_family: "'PingFang SC','Microsoft YaHei','Noto Sans SC',-apple-system,sans-serif"
  body_size: 15
  lead_size: 16
  caption_size: 13
  code_size: 13
  line_height: 1.85
  letter_spacing: 0.3
  h2_size: 20
  h3_size: 17
  footnote_size: 12

spacing:
  content_padding_x: 8
  paragraph_gap: 18
  block_gap: 16
  section_gap_top: 32
  section_gap_bottom: 16
  sub_section_gap_top: 24
  sub_section_gap_bottom: 12
  image_gap: 20

radius:
  sm: 4
  md: 8
  lg: 12

border:
  width_thin: 1
  width_strong: 2

shadow:
  card: "none"
  image: "none"
