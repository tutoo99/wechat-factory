prefer:
  lane:
    - tech
  article_subtype:
    - mistake_breakdown
    - tool_review
    - long_read
  goals:
    - save
    - read_finish
  content_features:
    contains_code: true
    contains_table: true
    emotional_density: low

avoid:
  article_subtype:
    - emotional_story
  content_features:
    emotional_density: high
    audience_age: senior

notes:
  - 适合信息密度高、结构化强的技术长文
  - 重点是清晰、克制、可扫描
