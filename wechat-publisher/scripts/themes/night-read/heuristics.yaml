prefer:
  lane:
    - emotion
  article_subtype:
    - opinion
    - growth
    - emotional_story
    - long_read
    - listicle
  goals:
    - read_finish
    - share
  content_features:
    quote_density: high
    narrative_flow: true
    emotional_density: medium

avoid:
  lane:
    - tech
  article_subtype:
    - mistake_breakdown
    - tool_review
  content_features:
    contains_code: true
    contains_table: true
    contains_heavy_image: true

notes:
  - "适合阅读号/成长号的人物故事、观点论述、金句密集类长文"
  - "深红棕(#7B0C00)章节标题不宜超过6-8处，保持克制"
  - "灰影引用卡片用于名人名言/书中金句，一篇文章3-5处最佳"
  - "\"- End -\"结尾装饰适合叙事/故事类，不适合清单体/工具类"
  - "15px正文偏小，如果目标读者年龄偏大（55+），建议用emotion-warm"
  - "技术文/代码密集文章请使用 tech-clean"
  - "整体配色非常克制，没有鲜艳强调色，靠字号层级和阴影制造层次"
