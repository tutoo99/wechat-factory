authoring_notes:
  - 深红棕(#7B0C00)标题是核心视觉签名，用于章节小标题，不用于H2大标题
  - 引用卡片有灰色阴影(box-shadow)，区别于其他主题的无阴影风格
  - 正文字间距1px较大，营造疏朗的阅读节奏感
  - Cochin-BoldItalic的"- End -"结尾装饰，适合叙事/故事类结尾
  - 整体配色克制：白底+黑正文+深红标题+暖灰辅助，没有花哨的强调色
  - 适合人物故事、观点论述、金句密集的阅读类内容
  - 15px正文字号偏小，配合1.75em行高和1px字间距保证舒适度
