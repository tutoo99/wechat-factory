colors:
  primary: "#000000"
  secondary: "#222222"
  accent: "#7B0C00"
  text: "#000000"
  text_secondary: "#6E6E6E"
  text_muted: "#888888"
  surface: "#FFFFFF"
  surface_soft: "#F7F7F7"
  border: "#E3E4E5"
  link: "#104E8B"
  code_bg: "#F3F3F3"
  code_inline_bg: "#F3F3F3"
  quote_bg: "#FFFFFF"
  highlight_bg: "#FFFFFF"
  heading_palette:
    - "#7B0C00"
    - "#222222"
    - "#000000"
  code_text: "#333333"
  code_label: "#888888"
  inline_code_text: "#7B0C00"
  dark_red_heading: "#7B0C00"
  warm_gray: "#6E6E6E"
  brown_footer: "#8B7B7B"
  dark_blue_link: "#104E8B"
  orange_heart: "#FF6827"
  teal_audio: "#7B8B8B"

typography:
  font_family: "system-ui,-apple-system,BlinkMacSystemFont,Helvetica Neue,PingFang SC,Hiragino Sans GB,Microsoft YaHei UI,Microsoft YaHei,Arial,sans-serif"
  body_size: 17
  lead_size: 17
  caption_size: 13
  code_size: 13
  line_height: 1.75
  letter_spacing: 1
  letter_spacing_meta: 0.5
  h2_size: 20
  h3_size: 16
  footnote_size: 12
  font_weight_heading: bold
  font_weight_body: 400
  text_align: justify
  end_mark_font: "Cochin-BoldItalic"
  end_mark_size: 16

spacing:
  content_padding_x: 8
  paragraph_gap: 0
  block_gap: 0
  section_gap_top: 48
  section_gap_bottom: 0
  sub_section_gap_top: 16
  sub_section_gap_bottom: 0
  image_gap: 0

radius:
  sm: 4
  md: 8
  lg: 8

border:
  width_thin: 0
  width_strong: 0

shadow:
  card: "rgb(102, 102, 102) 0px 0px 10px 0px"
  image: "none"
