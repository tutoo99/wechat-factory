    transition_to_next: 最后要回到一个更现实的问题：不是所有人都要马上离开外包，但每个人都不能把选择权交出去。
    materials: []
  - index: 5
    title: 可以暂时在外包，但别把选择权外包出去
    function: ending
    reader_question: 外包经历是不是就一定没有价值？
